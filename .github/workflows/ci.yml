name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  container-ci:
    name: Container checks and correctness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run checks and correctness lanes
        run: make ci

  package:
    name: Container package validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Build and validate package artifacts
        run: make package
