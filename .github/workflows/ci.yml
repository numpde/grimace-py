name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  container-ci:
    name: Container checks and correctness
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Run checks and correctness lanes
        run: make ci

  package:
    name: Container package validation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Build and validate package artifacts
        run: make package
