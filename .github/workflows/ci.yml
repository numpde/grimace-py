name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Rust tests
        run: cargo test --lib

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install test tools
        run: python -m pip install --upgrade pip maturin
      - name: Build wheel
        run: maturin build --release --out dist -i python3.12
      - name: Install built wheel
        run: python -m pip install dist/grimace-*.whl
      - name: Run Python test suite from source tree
        run: PYTHONPATH=python:. python -m unittest discover -s tests -t . -q

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build tools
        run: python -m pip install --upgrade pip maturin twine
      - name: Build wheel and sdist
        run: maturin build --release --sdist --out dist -i python3.12
      - name: Check distribution metadata
        run: python -m twine check dist/*
      - name: Install built wheel
        run: python -m pip install dist/grimace-*.whl
      - name: Run installed-package smoke tests
        run: python -m unittest tests.integration.test_python_api_smoke -q
