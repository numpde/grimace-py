name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  wheel:
    name: Build wheel (linux-x86_64, cp${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64
            manylinux: "2_28"
            python-version: "3.12"
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64
            manylinux: "2_28"
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist -i python${{ matrix.python-version }}
      - name: Install built wheel
        run: python -m pip install dist/*.whl
      - name: Run installed-package correctness subset
        run: python -m unittest tests.run_installed_package_correctness -q
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.name }}-cp${{ matrix.python-version }}
          path: dist

  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Install built source distribution
        run: python -m pip install dist/*.tar.gz
      - name: Run installed-package correctness subset
        run: python -m unittest tests.run_installed_package_correctness -q
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - wheel
      - sdist
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          name: grimace-py ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
