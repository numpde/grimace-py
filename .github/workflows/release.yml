name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  wheels:
    name: Build wheels (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64
            manylinux: "2_28"
          - name: windows-x86_64
            os: windows-latest
            target: x86_64
          - name: macos-x86_64
            os: macos-13
            target: x86_64
          - name: macos-aarch64
            os: macos-14
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        if: runner.os == 'Linux'
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --find-interpreter
      - uses: PyO3/maturin-action@v1
        if: runner.os != 'Linux'
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: dist

  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - wheels
      - sdist
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
