name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  MATURIN_PIP_VERSION: "1.13.1"
  MATURIN_ACTION_VERSION: "v1.13.1"
  MANYLINUX_2_28_X86_64_IMAGE: "quay.io/pypa/manylinux_2_28_x86_64@sha256:441c35fdc6ee809ff9260894f8468ab4fea8c15dc880f8700a3f81b7922c1cda"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"
  RDKIT_FIXTURE_PIP_VERSION: "2026.3.1"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate-release:
    name: Validate release metadata
    runs-on: ubuntu-24.04
    steps:
      - name: Require vX.Y.Z tag
        run: |
          if [[ "$GITHUB_EVENT_NAME" != "push" ]]; then
            exit 0
          fi
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf 'Release tag must look like vX.Y.Z, got %s.\n' "$GITHUB_REF_NAME" >&2
            exit 2
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Require checked-in release notes
        if: github.event_name == 'push'
        run: test -f "notes/releases/${GITHUB_REF_NAME}.md"

  wheel:
    name: Build wheel (linux-x86_64, cp${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs:
      - validate-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
            target: x86_64
            manylinux: "2_28"
            python-version: "3.12"
          - name: linux-x86_64
            os: ubuntu-24.04
            target: x86_64
            manylinux: "2_28"
            python-version: "3.13"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          maturin-version: ${{ env.MATURIN_ACTION_VERSION }}
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          container: ${{ env.MANYLINUX_2_28_X86_64_IMAGE }}
          args: --release --compatibility pypi --out dist -i python${{ matrix.python-version }}
      - name: Install pinned RDKit fixture version
        run: python -m pip install --constraint requirements/container-build-constraints.txt "rdkit==$RDKIT_FIXTURE_PIP_VERSION"
      - name: Install built wheel
        run: python -m pip install --no-deps dist/*.whl
      - name: Run installed-package correctness subset
        run: python -m unittest tests.run_installed_package_correctness -q
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheel-${{ matrix.name }}-cp${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    name: Build source distribution
    runs-on: ubuntu-24.04
    needs:
      - validate-release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          maturin-version: ${{ env.MATURIN_ACTION_VERSION }}
          command: sdist
          args: --out dist
      - name: Install pinned build and runtime fixture versions
        run: python -m pip install --constraint requirements/container-build-constraints.txt "maturin==$MATURIN_PIP_VERSION" "rdkit==$RDKIT_FIXTURE_PIP_VERSION"
      - name: Install built source distribution
        run: python -m pip install --no-deps --no-build-isolation dist/*.tar.gz
      - name: Run installed-package correctness subset
        run: python -m unittest tests.run_installed_package_correctness -q
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    needs:
      - wheel
      - sdist
    permissions:
      actions: read
      contents: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true
      - name: Validate release artifacts
        run: python scripts/validate_release_artifacts.py dist --tag "$GITHUB_REF_NAME"
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          name: grimace-py ${{ github.ref_name }}
          body_path: notes/releases/${{ github.ref_name }}.md
          files: dist/*

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-24.04
    needs:
      - wheel
      - sdist
    permissions:
      actions: read
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/grimace-py
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true
      - name: Validate release artifacts
        run: python scripts/validate_release_artifacts.py dist --tag "$GITHUB_REF_NAME"
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist
