name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  RDKIT_FIXTURE_PIP_VERSION: "2026.3.1"

permissions:
  contents: read

jobs:
  wheel:
    name: Build wheel (linux-x86_64, cp${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64
            manylinux: "2_28"
            python-version: "3.12"
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64
            manylinux: "2_28"
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --locked --out dist -i python${{ matrix.python-version }}
      - name: Install pinned RDKit fixture version
        run: python -m pip install "rdkit==$RDKIT_FIXTURE_PIP_VERSION"
      - name: Install built wheel
        run: python -m pip install dist/*.whl
      - name: Run installed-package correctness subset
        run: python -m unittest tests.run_installed_package_correctness -q
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.name }}-cp${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Install pinned RDKit fixture version
        run: python -m pip install "rdkit==$RDKIT_FIXTURE_PIP_VERSION"
      - name: Install built source distribution
        run: python -m pip install dist/*.tar.gz
      - name: Run installed-package correctness subset
        run: python -m unittest tests.run_installed_package_correctness -q
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - wheel
      - sdist
    permissions:
      actions: read
      contents: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Require checked-in release notes
        run: test -f "notes/releases/${GITHUB_REF_NAME}.md"
      - name: Validate release artifacts
        run: python scripts/validate_release_artifacts.py dist --tag "$GITHUB_REF_NAME"
      - uses: softprops/action-gh-release@v3
        with:
          name: grimace-py ${{ github.ref_name }}
          body_path: notes/releases/${{ github.ref_name }}.md
          files: dist/*

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - wheel
      - sdist
    permissions:
      actions: read
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/grimace-py
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Validate release artifacts
        run: python scripts/validate_release_artifacts.py dist --tag "$GITHUB_REF_NAME"
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
