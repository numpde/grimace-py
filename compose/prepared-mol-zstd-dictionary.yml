services:
  prepared-mol-zstd-dictionary:
    build:
      context: ..
      dockerfile: containers/prepared-mol-zstd-dictionary/Dockerfile
    image: grimace-py-prepared-mol-zstd-dictionary:local
    working_dir: /src
    user: "${LOCAL_UID:?Set LOCAL_UID through Makefile}:${LOCAL_GID:?Set LOCAL_GID through Makefile}"
    network_mode: "none"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 1024
    mem_limit: 3g
    tmpfs:
      - /tmp:size=1024m,mode=1777
    environment:
      PREPARED_MOL_ZSTD_CREATED_DATE: "${PREPARED_MOL_ZSTD_CREATED_DATE:-}"
      PREPARED_MOL_ZSTD_FORCE: "${PREPARED_MOL_ZSTD_FORCE:-0}"
    volumes:
      - type: bind
        source: ../python/grimace/data/prepared_mol_zstd
        target: /src/python/grimace/data/prepared_mol_zstd
        bind:
          create_host_path: false
    entrypoint:
      - /bin/sh
      - -euc
      - |
        case "$${PREPARED_MOL_ZSTD_FORCE}" in
          0|1) ;;
          *) printf '%s\n' 'PREPARED_MOL_ZSTD_FORCE must be 0 or 1.' >&2; exit 2 ;;
        esac
        python -m unittest tests.checks.test_prepared_mol_zstd_generator_contract -q
        python -m unittest tests.prepared_mol_zstd_dictionary_flight -q
        set -- --output-root /src/python/grimace/data/prepared_mol_zstd
        if [ -n "$${PREPARED_MOL_ZSTD_CREATED_DATE}" ]; then
          set -- "$$@" --created-date "$${PREPARED_MOL_ZSTD_CREATED_DATE}"
        fi
        if [ "$${PREPARED_MOL_ZSTD_FORCE}" = "1" ]; then
          set -- "$$@" --force
        fi
        python scripts/prepared_mol_zstd_dictionary_generate.py "$$@"
        python -m unittest tests.prepared_mol_zstd_dictionary_rates -q
