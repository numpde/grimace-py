services:
  prepared-mol-zstd-dictionary:
    build:
      context: ..
      dockerfile: containers/prepared-mol-zstd-dictionary/Dockerfile
    image: grimace-py-prepared-mol-zstd-dictionary:local
    working_dir: /src
    user: "${LOCAL_UID:?Set LOCAL_UID through Makefile}:${LOCAL_GID:?Set LOCAL_GID through Makefile}"
    network_mode: "none"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 1024
    mem_limit: 3g
    tmpfs:
      - /tmp:size=1024m,mode=1777
    environment:
      PREPARED_MOL_ZSTD_CREATED_DATE: "${PREPARED_MOL_ZSTD_CREATED_DATE:-}"
      PREPARED_MOL_ZSTD_REPLACE_ARTIFACT: "${PREPARED_MOL_ZSTD_REPLACE_ARTIFACT:-}"
      PREPARED_MOL_ZSTD_TRAINING_LEVEL: "${PREPARED_MOL_ZSTD_TRAINING_LEVEL:?Set PREPARED_MOL_ZSTD_TRAINING_LEVEL through Makefile}"
    volumes:
      - type: bind
        source: ../python/grimace/data/prepared_mol_zstd
        target: /src/python/grimace/data/prepared_mol_zstd
        bind:
          create_host_path: false
    entrypoint:
      - /bin/sh
      - -euc
      - |
        if [ -n "$${PREPARED_MOL_ZSTD_REPLACE_ARTIFACT}" ]; then
          case "$${PREPARED_MOL_ZSTD_REPLACE_ARTIFACT}" in
            [0123456789][0123456789][0123456789][0123456789][0123456789][0123456789][0123456789][0123456789]_[0123456789abcdef][0123456789abcdef][0123456789abcdef][0123456789abcdef][0123456789abcdef][0123456789abcdef][0123456789abcdef][0123456789abcdef]) ;;
            *) printf '%s\n' 'PREPARED_MOL_ZSTD_REPLACE_ARTIFACT must be YYYYMMDD_hash when set.' >&2; exit 2 ;;
          esac
        fi
        case "$${PREPARED_MOL_ZSTD_TRAINING_LEVEL}" in
          ''|*[!0-9]*) printf '%s\n' 'PREPARED_MOL_ZSTD_TRAINING_LEVEL must be an integer.' >&2; exit 2 ;;
        esac
        if [ "$${PREPARED_MOL_ZSTD_TRAINING_LEVEL}" -lt 1 ] || [ "$${PREPARED_MOL_ZSTD_TRAINING_LEVEL}" -gt 22 ]; then
          printf '%s\n' 'PREPARED_MOL_ZSTD_TRAINING_LEVEL must be in zstd range 1..22.' >&2
          exit 2
        fi
        python -m unittest tests.checks.test_prepared_mol_zstd_generator_contract -q
        python -m unittest tests.prepared_mol_zstd_dictionary_flight -q
        set -- --output-root /src/python/grimace/data/prepared_mol_zstd
        set -- "$$@" --training-level "$${PREPARED_MOL_ZSTD_TRAINING_LEVEL}"
        if [ -n "$${PREPARED_MOL_ZSTD_CREATED_DATE}" ]; then
          set -- "$$@" --created-date "$${PREPARED_MOL_ZSTD_CREATED_DATE}"
        fi
        if [ -n "$${PREPARED_MOL_ZSTD_REPLACE_ARTIFACT}" ]; then
          set -- "$$@" --replace-artifact "$${PREPARED_MOL_ZSTD_REPLACE_ARTIFACT}"
        fi
        python scripts/prepared_mol_zstd_dictionary_generate.py "$$@"
        python -m unittest tests.prepared_mol_zstd_dictionary_rates -q
