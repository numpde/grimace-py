services:
  test-package:
    build:
      context: ..
      dockerfile: containers/package/Dockerfile
    image: grimace-py-package:local
    working_dir: /src
    user: "${LOCAL_UID:?Set LOCAL_UID through Makefile}:${LOCAL_GID:?Set LOCAL_GID through Makefile}"
    network_mode: "none"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 1024
    mem_limit: 2g
    tmpfs:
      - /cargo-target:size=1024m,mode=1777,exec
      - /tmp:size=1024m,mode=1777
      - /venv:size=1024m,mode=1777,exec
    environment:
      CARGO_TARGET_DIR: /cargo-target
    entrypoint:
      - /bin/sh
      - -euxc
      - |
        dist_dir="$$(mktemp -d /tmp/grimace-dist.XXXXXX)"
        python -m maturin build --release --out "$$dist_dir" -i python3.12
        python -m maturin build --release --sdist --out "$$dist_dir" -i python3.12
        python -m twine check "$$dist_dir"/*
        python scripts/validate_release_artifacts.py "$$dist_dir"/*.whl --wheel-only
        python scripts/validate_release_artifacts.py "$$dist_dir"/*.tar.gz --sdist-only
        python -m venv --system-site-packages /venv/wheel
        /venv/wheel/bin/python -m pip install --no-deps "$$dist_dir"/*.whl
        /venv/wheel/bin/python -m unittest tests.run_installed_package_correctness -q
        python -m venv --system-site-packages /venv/sdist
        /venv/sdist/bin/python -m pip install --no-deps --no-build-isolation "$$dist_dir"/*.tar.gz
        /venv/sdist/bin/python -m unittest tests.run_installed_package_correctness -q
