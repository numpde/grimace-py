services:
  timings-prepared-mol-zstd:
    build:
      context: ..
      dockerfile: containers/timings-prepared-mol-zstd/Dockerfile
    image: grimace-py-timings-prepared-mol-zstd:local
    working_dir: /build-src
    user: "${LOCAL_UID:?Set LOCAL_UID through Makefile}:${LOCAL_GID:?Set LOCAL_GID through Makefile}"
    network_mode: "none"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 1024
    mem_limit: 2g
    tmpfs:
      - /tmp:size=1024m,mode=1777
    environment:
      GRIMACE_PERF_GIT_COMMIT: "${GRIMACE_PERF_GIT_COMMIT:-}"
      GRIMACE_PERF_GIT_CHANGE: "${GRIMACE_PERF_GIT_CHANGE:-}"
      GRIMACE_PERF_GIT_DIRTY: "${GRIMACE_PERF_GIT_DIRTY:-}"
      MPLCONFIGDIR: /tmp/matplotlib
    volumes:
      - type: bind
        source: ../docs/timings-prepared-mol-zstd.tsv
        target: /build-src/docs/timings-prepared-mol-zstd.tsv
        bind:
          create_host_path: false
      - type: bind
        source: ../docs/timings-prepared-mol-zstd-plots
        target: /build-src/docs/timings-prepared-mol-zstd-plots
        bind:
          create_host_path: false
    entrypoint:
      - /bin/sh
      - -euc
      - |
        python scripts/timings_prepared_mol_zstd_measure.py
        python scripts/timings_prepared_mol_zstd_plot.py
